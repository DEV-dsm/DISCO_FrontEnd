<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link rel="stylesheet" href="signIn.css">
</head>
<body>

    </svg>
  </div>
  <fieldset>
    <div id="signInInfo">
      <input id="id" class="textInp" placeholder="아이디를 입력하세요.">
      <input id="password" class="textInp" type="password" placeholder="비밀번호를 입력하세요.">
      <input id="pwAgain" class="textInp" type="password" placeholder="비밀번호를 재입력하세요.">
    </div>
    <div id="profile">
      <input id="name" class="textInp" placeholder="이름을 입력하세요.">
      <div id="email">
        <input id="mail" class="textInp" placeholder="이메일을 입력하세요.">
        <select id="emailType" class="textInp">
          <option value="none">직접입력</option>
          <option value="gmail">@ gmail.com</option>
          <option value="naver">@ naver.com</option>
        </select>
      </div>
      <div id="inzeng">
        <input id="num" class="textInp" placeholder="인증번호를 입력하세요.">
        <button>재전송</button>
      </div>
    </div>
    <div id="btns">
      <button id="signIn">가입하기</button>
      <button id="cancel">취소</button>
    </div>
  </fieldset>
</body>
</html>
